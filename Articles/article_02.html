    iframe {

        border: none;
    }
    body > p {
        text-align: center;
        color: #fff;
        padding-top: 20px;
    }
</style>
<script>
window.onload = function() {
    var pdfUrl = "https://pub-be55520ef38745d6bdd2347de9cfa440.r2.dev/Search%20And%20BlendShape%20For%20Curves_Document.pdf";

    // 检测手机设备
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
        // 手机端直接打开 PDF
        window.location.href = pdfUrl;
    } else {
        // PC 端嵌入 PDF.js 阅读器
        var iframe = document.createElement('iframe');
        iframe.src = "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + encodeURIComponent(pdfUrl);
        document.body.appendChild(iframe);
    }
};
</script>
